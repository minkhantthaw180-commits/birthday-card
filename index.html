<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: linear-gradient(135deg, #ffe6eb, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.2);
            text-align: center;
            max-width: 400px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            color: #ff477e;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .emoji {
            font-size: 4rem;
            animation: bounce 2s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="emoji">🎁</div>
        <!-- EDIT THE NAME BELOW -->
        <h1>Happy Birthday, SHOON LAE WADI! 🎉</h1>
        <!-- EDIT YOUR MESSAGE BELOW -->
        <p>Wishing you the happiest, brightest day ever. Thank you for being such an amazing friend! 🎂✨</p>
    </div>

</body>
</html>
